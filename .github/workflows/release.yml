name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build packages
        run: bun run build

      - name: Setup Node.js registry auth
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: ${{ vars.NPM_REGISTRY_URL || 'https://registry.npmjs.org' }}

      - name: Publish slim-git
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/slim-git
        run: bun publish --access public
